# =============================================================================
# Parking Lot Management System - Nginx Frontend Static Configuration
#
# This config serves the built frontend static files (Vite/React app) on port 3000.
# It includes the necessary fallback configuration for React Router.
#
# Setup:
#   See nginx/README.md for installation steps.
# =============================================================================

server {
    listen 3000;
    listen [::]:3000;

    # Replace with your server's hostname or IP if you have a domain.
    # '_' means "match any hostname" which works for bare IP access.
    server_name _;

    # The installer script will replace this placeholder with the actual absolute path
    root __FRONTEND_DIST__;
    index index.html;

    # ---- Security headers ---------------------------------------------------
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # ---- Static File Serving & React Router fallback ------------------------
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache static assets aggressively
    location ~* \.(?:css|js|jpg|jpeg|gif|png|ico|svg|woff|woff2|ttf|otf|webp)$ {
        expires 1y;
        add_header Cache-Control "public, no-transform";
        access_log off;
    }

    # Deny access to sensitive files
    location ~* \.(env|git|sql|sh|log)$ {
        deny all;
    }
}
