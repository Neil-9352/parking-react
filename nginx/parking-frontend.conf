# =============================================================================
# Parking Lot Management System - Nginx Frontend Static Configuration
#
# This config serves the built frontend static files (Vite/React app) on port 80.
# It includes the necessary fallback configuration for React Router.
#
# Setup:
#   See nginx/README.md for installation steps.
# =============================================================================

server {
    listen __FRONTEND_PORT__;
    listen [::]:__FRONTEND_PORT__;

    # Replace with your server's hostname or IP if you have a domain.
    # '_' means "match any hostname" which works for bare IP access.
    server_name _;

    # The installer script will replace this placeholder with the actual absolute path
    root __FRONTEND_DIST__;
    index index.html;

    # ---- Security headers ---------------------------------------------------
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # ---- Backend API Proxy --------------------------------------------------
    # Forward all API, upload, and receipt requests to the backend server.
    # This solves cross-site HTTP cookie issues by making requests same-origin.
    location ~ ^/(api|uploads|receipts)(/.*)?$ {
        proxy_pass         http://__BACKEND_HOST__:__BACKEND_PORT__;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   X-Forwarded-Host  $host;

        # Timeouts and buffers
        proxy_read_timeout    120s;
        proxy_connect_timeout 10s;
        proxy_send_timeout    120s;
        client_max_body_size  16m;
        proxy_buffering       off;
    }

    # ---- Static File Serving & React Router fallback ------------------------
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache static assets aggressively
    location ~* \.(?:css|js|jpg|jpeg|gif|png|ico|svg|woff|woff2|ttf|otf|webp)$ {
        expires 1y;
        add_header Cache-Control "public, no-transform";
        access_log off;
    }

    # Deny access to sensitive files
    location ~* \.(env|git|sql|sh|log)$ {
        deny all;
    }
}
