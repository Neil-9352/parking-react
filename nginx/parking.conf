# =============================================================================
# Parking Lot Management System - Nginx Reverse Proxy Configuration
#
# This config makes the Express backend accessible from any frontend machine
# without hardcoding a FRONTEND_URL in the backend's CORS configuration.
#
# Architecture:
#   [Any Browser] → Nginx :8080 (this machine) → Express :3001 (127.0.0.1)
#
# The backend Express process should be bound to 127.0.0.1 only and is
# never directly reachable from outside. Nginx is the sole public entry point.
#
# Setup:
#   See nginx/README.md for installation steps.
# =============================================================================

# ---- Helper map: resolve the CORS allowed origin dynamically ----------------
# This reflects whatever Origin header the browser sends, so any frontend
# machine (any IP/hostname) is accepted without any code changes.
# If you want to restrict access, replace the default with 'deny' and list
# allowed origins explicitly (see commented example below).
# -----------------------------------------------------------------------------
map $http_origin $cors_origin {
    default "$http_origin";

    # --- Whitelist example (uncomment and remove the 'default' line above) ---
    # "~^http://(192\.168\.1\.[0-9]+|your-domain\.com)(:[0-9]+)?$" "$http_origin";
    # default "";
}

# =============================================================================
# Main server block
# =============================================================================
server {
    listen 8080;
    listen [::]:8080;

    # Replace with your server's hostname or IP if you have a domain.
    # '_' means "match any hostname" which works for bare IP access.
    server_name _;

    # ---- Security headers ---------------------------------------------------
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # ---- CORS preflight (OPTIONS) handler -----------------------------------
    # This block intercepts OPTIONS preflight requests and returns the correct
    # CORS headers immediately, without proxying to Express. This avoids
    # double CORS headers and works for any request method.
    location / {
        if ($request_method = 'OPTIONS') {
            add_header Access-Control-Allow-Origin  "$cors_origin" always;
            add_header Access-Control-Allow-Methods "GET, POST, PUT, PATCH, DELETE, OPTIONS" always;
            add_header Access-Control-Allow-Headers "Authorization, Content-Type, Accept, X-Requested-With" always;
            add_header Access-Control-Allow-Credentials "true" always;
            add_header Access-Control-Max-Age 86400 always;
            add_header Content-Type "text/plain; charset=UTF-8";
            add_header Content-Length 0;
            return 204;
        }

        # All non-OPTIONS requests that don't match a more specific location
        # block below fall through to this default — return 404 so the backend
        # is not exposed at arbitrary paths.
        return 404;
    }

    # ---- Backend API routes -------------------------------------------------
    # Proxy /api/* and all static asset paths served by Express.
    location ~ ^/(api|uploads|receipts)(/.*)?$ {
        # Handle CORS for actual (non-OPTIONS) requests
        add_header Access-Control-Allow-Origin      "$cors_origin" always;
        add_header Access-Control-Allow-Credentials "true" always;
        add_header Access-Control-Expose-Headers    "Content-Disposition" always;

        proxy_pass         http://127.0.0.1:3001;

        # Pass the real client information to Express
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        # Needed so Express cookie 'secure' flag works correctly behind proxy
        proxy_set_header   X-Forwarded-Host  $host;

        # Increase timeouts for PDF generation / large file uploads
        proxy_read_timeout    120s;
        proxy_connect_timeout 10s;
        proxy_send_timeout    120s;

        # Increase upload body size limit (matches Express 15 mb limit)
        client_max_body_size  16m;

        # Disable buffering for streaming responses (e.g. PDF downloads)
        proxy_buffering off;
    }

    # ---- Health check (exposed publicly for monitoring) ---------------------
    location = /health {
        add_header Access-Control-Allow-Origin "$cors_origin" always;

        proxy_pass       http://127.0.0.1:3001;
        proxy_set_header Host            $host;
        proxy_set_header X-Real-IP       $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # ---- Deny direct access to anything else --------------------------------
    location ~* \.(env|git|sql|sh|log)$ {
        deny all;
    }
}
